---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme %} data-theme="{{ site.site_theme }}"{% endif %}>
  <head>
    {% include analytics.html %}
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>
    <canvas id="topo-canvas"></canvas>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

    <script>
    /* Interactive Topographic Grid — Inline (bypasses bundle lock) */
    (function() {
      var canvas = document.getElementById('topo-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var width = canvas.width = window.innerWidth;
      var height = canvas.height = window.innerHeight;
      var mouse = { x: -1000, y: -1000, targetX: -1000, targetY: -1000, active: false };
      window.addEventListener('resize', function() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });
      window.addEventListener('mousemove', function(e) {
        mouse.targetX = e.clientX; mouse.targetY = e.clientY; mouse.active = true;
      });
      window.addEventListener('mouseleave', function() { mouse.active = false; });

      var spacing = 50, warpRadius = 180, maxDisp = 25;
      mouse.x = window.innerWidth / 2; mouse.y = window.innerHeight / 2;

      function draw() {
        ctx.clearRect(0, 0, width, height);
        if (mouse.active) {
          mouse.x += (mouse.targetX - mouse.x) * 0.1;
          mouse.y += (mouse.targetY - mouse.y) * 0.1;
        } else {
          mouse.x += (-1000 - mouse.x) * 0.05;
          mouse.y += (-1000 - mouse.y) * 0.05;
        }
        var cols = Math.ceil(width / spacing) + 2;
        var rows = Math.ceil(height / spacing) + 2;
        var points = [];
        for (var r = 0; r < rows; r++) {
          points[r] = [];
          var posY = (r - 1) * spacing;
          for (var c = 0; c < cols; c++) {
            var posX = (c - 1) * spacing;
            var x = posX, y = posY;
            var dx = x - mouse.x, dy = y - mouse.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < warpRadius) {
              var force = 1 - dist / warpRadius;
              var angle = Math.atan2(dy, dx);
              x += Math.cos(angle) * force * maxDisp;
              y += Math.sin(angle) * force * maxDisp;
            }
            points[r][c] = { x: x, y: y };
          }
        }
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        ctx.beginPath();
        // Use Everforest bg4 for the grid lines
        ctx.strokeStyle = isDark ? 'rgba(79,88,94,0.45)' : 'rgba(180,188,192,0.40)';
        ctx.lineWidth = 1.0;
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            var p = points[r][c];
            if (c < cols - 1) { ctx.moveTo(p.x, p.y); ctx.lineTo(points[r][c+1].x, points[r][c+1].y); }
            if (r < rows - 1) { ctx.moveTo(p.x, p.y); ctx.lineTo(points[r+1][c].x, points[r+1][c].y); }
          }
        }
        ctx.stroke();
        
        ctx.beginPath();
        // Crosshairs use subtle grey1
        ctx.strokeStyle = isDark ? 'rgba(133,146,137,0.20)' : 'rgba(122,130,136,0.20)';
        for (var r = 0; r < rows; r++) {
          for (var c = 0; c < cols; c++) {
            var p = points[r][c];
            ctx.moveTo(p.x - 3, p.y); ctx.lineTo(p.x + 3, p.y);
            ctx.moveTo(p.x, p.y - 3); ctx.lineTo(p.x, p.y + 3);
          }
        }
        ctx.stroke();
        
        if (mouse.active && mouse.x > 0 && mouse.x < width && mouse.y > 0 && mouse.y < height) {
          // Radar target rings in Sage green
          ctx.strokeStyle = isDark ? 'rgba(167,192,128,0.18)' : 'rgba(131,192,146,0.18)';
          ctx.lineWidth = 1.0;
          for (var i = 1; i <= 3; i++) {
            ctx.beginPath(); ctx.arc(mouse.x, mouse.y, i * 45, 0, Math.PI * 2); ctx.stroke();
          }
          
          var lat = (51.5221 - (mouse.y / height) * 0.01).toFixed(5);
          var lon = (-0.1299 + (mouse.x / width) * 0.02).toFixed(5);
          
          // Sage green for GPS readout text
          ctx.fillStyle = isDark ? 'rgba(167,192,128,0.85)' : 'rgba(93,160,105,0.90)';
          ctx.font = '9px monospace';
          ctx.fillText('LAT: ' + lat + '\u00B0 N', mouse.x + 15, mouse.y - 15);
          ctx.fillText('LON: ' + lon + '\u00B0 W', mouse.x + 15, mouse.y - 5);
          
          // Sage green for target crosshair center
          ctx.strokeStyle = isDark ? 'rgba(167,192,128,0.45)' : 'rgba(131,192,146,0.45)';
          ctx.beginPath();
          ctx.moveTo(mouse.x - 10, mouse.y); ctx.lineTo(mouse.x + 10, mouse.y);
          ctx.moveTo(mouse.x, mouse.y - 10); ctx.lineTo(mouse.x, mouse.y + 10);
          ctx.stroke();
        }
        requestAnimationFrame(draw);
      }

      var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (!mq.matches) { requestAnimationFrame(draw); }
    })();
    </script>

  </body>
</html>
